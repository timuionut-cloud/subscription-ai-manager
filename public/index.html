<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Subscription Finance Manager</title>

<style>
body{
font-family:Arial;
background:#0b1220;
color:white;
padding:20px;
max-width:1100px;
margin:auto;
}

.card{
background:#111827;
padding:15px;
border-radius:12px;
margin-bottom:10px;
}

button{
padding:8px 12px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
cursor:pointer;
margin-top:5px;
}

.delete{background:#ef4444}
.paid{background:#22c55e}

.dashboard{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-bottom:20px;
}

.sub{
background:#111827;
padding:15px;
border-radius:12px;
margin-bottom:10px;
}

</style>
</head>

<body>

<h1>Subscription Finance Manager</h1>

<button onclick="addBudget()">Add Budget Source</button>
<button onclick="addSub()">Add Subscription</button>

<br><br>

<select id="categoryFilter" onchange="render()">
<option value="all">All Categories</option>
</select>

<input type="month" id="monthFilter" onchange="render()" />

<h2>Dashboard</h2>

<div class="dashboard">

<div class="card">
Total Income
<div id="income"></div>
</div>

<div class="card">
Monthly Subscriptions
<div id="monthly"></div>
</div>

<div class="card">
Remaining Budget
<div id="remaining"></div>
</div>

<div class="card">
Next Payment
<div id="next"></div>
</div>

</div>

<h2>Next Payments</h2>
<div id="nextPayments"></div>

<h2>Subscriptions</h2>
<div id="list"></div>

<script>

let subs = JSON.parse(localStorage.getItem("subs") || "[]");
let budgets = JSON.parse(localStorage.getItem("budgets") || "[]");

function save(){
localStorage.setItem("subs", JSON.stringify(subs));
localStorage.setItem("budgets", JSON.stringify(budgets));
}

function addBudget(){
const name = prompt("Budget name (Salary, Business etc)");
const amount = Number(prompt("Monthly income amount"));

budgets.push({name,amount});
save();
render();
}

function addSub(){

if(budgets.length===0){
alert("Add a budget first");
return;
}

const name = prompt("Subscription name");
const price = Number(prompt("Price GBP"));
const category = prompt("Category");
const payDay = Number(prompt("Payment day (1-28)"));

let budgetNames = budgets.map(b=>b.name).join(", ");
const budget = prompt("Which budget? ("+budgetNames+")");

subs.push({name,price,category,payDay,budget});
save();
render();
}

function markPaid(i){

let sub=subs[i];
let today=new Date();
today.setMonth(today.getMonth()+1);

subs[i].payDay=sub.payDay;

save();
render();
}

function deleteSub(i){
subs.splice(i,1);
save();
render();
}

function render(){

let catFilter=document.getElementById("categoryFilter").value;
let month=document.getElementById("monthFilter").value;

let list=document.getElementById("list");
let nextPayments=document.getElementById("nextPayments");

list.innerHTML="";
nextPayments.innerHTML="";

let income=0;
budgets.forEach(b=>income+=b.amount);

let monthly=0;

let categories=new Set();

subs.forEach((s,i)=>{

categories.add(s.category);

if(catFilter!=="all" && s.category!==catFilter) return;

monthly+=s.price;

let div=document.createElement("div");
div.className="sub";

div.innerHTML=
"<b>"+s.name+"</b><br>" +
"£"+s.price+"<br>" +
"Category: "+s.category+"<br>" +
"Budget: "+s.budget+"<br>" +
"Pay day: "+s.payDay+
"<br><button class='paid' onclick='markPaid("+i+")'>Mark Paid</button>"+
"<br><button class='delete' onclick='deleteSub("+i+")'>Remove</button>";

list.appendChild(div);

});

let select=document.getElementById("categoryFilter");
select.innerHTML="<option value='all'>All Categories</option>";
categories.forEach(c=>{
let opt=document.createElement("option");
opt.value=c;
opt.textContent=c;
select.appendChild(opt);
});

let remaining=income-monthly;

document.getElementById("income").innerText="£"+income;
document.getElementById("monthly").innerText="£"+monthly;
document.getElementById("remaining").innerText="£"+remaining;

buildNextPayments();

}

function buildNextPayments(){

let container=document.getElementById("nextPayments");

let today=new Date();
let list=subs.map(s=>{
let d=new Date();
d.setDate(s.payDay);
return {...s,date:d};
});

list.sort((a,b)=>a.date-b.date);

list.slice(0,5).forEach(p=>{
let div=document.createElement("div");
div.className="card";

div.innerHTML=
p.name+" — £"+p.price+
"<br>Date: "+p.date.toDateString()+
"<br>Budget: "+p.budget;

container.appendChild(div);
});

}

render();

</script>

</body>
</html>
