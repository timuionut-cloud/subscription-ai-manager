<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Subscription Finance AI</title>

<style>
body{
font-family:Inter,system-ui;
background:#0f172a;
color:white;
max-width:1200px;
margin:auto;
padding:20px;
}

h1{margin-bottom:10px}

.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-bottom:25px;
}

.card{
background:#111827;
padding:18px;
border-radius:14px;
}

.big{
font-size:22px;
margin-top:6px;
}

button{
background:#3b82f6;
border:none;
padding:8px 14px;
border-radius:8px;
color:white;
cursor:pointer;
margin-top:6px;
}

.delete{background:#ef4444}
.paid{background:#22c55e}

.sub{
background:#111827;
padding:15px;
border-radius:12px;
margin-bottom:10px;
}

.filters{
display:flex;
gap:10px;
margin-bottom:15px;
flex-wrap:wrap;
}

.analytics{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:10px;
margin-bottom:20px;
}

.chart{
background:#111827;
padding:15px;
border-radius:12px;
margin-bottom:20px;
}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
}

.day{
background:#1f2937;
padding:8px;
border-radius:6px;
font-size:12px;
min-height:50px;
}

.highlight{
background:#3b82f6;
}
</style>
</head>

<body>

<h1>Subscription Finance Dashboard</h1>

<button onclick="addBudget()">Add Budget</button>
<button onclick="addSub()">Add Subscription</button>

<div class="filters">
<select id="categoryFilter" onchange="render()">
<option value="all">All Categories</option>
</select>

<input type="month" id="monthFilter" onchange="render()" />
<button onclick="resetFilters()">Reset</button>
</div>

<div class="dashboard">

<div class="card">
Income
<div id="income" class="big"></div>
</div>

<div class="card">
Subscriptions
<div id="monthly" class="big"></div>
</div>

<div class="card">
Remaining
<div id="remaining" class="big"></div>
</div>

<div class="card">
Next Payment
<div id="next" class="big"></div>
</div>

<div class="card">
Forecast Next Month
<div id="forecast" class="big"></div>
</div>

</div>

<h2>Category Analytics</h2>
<div class="analytics" id="analytics"></div>

<div class="chart">
<h2>Cost Chart</h2>
<canvas id="chart" height="120"></canvas>
</div>

<h2>Calendar Renewals</h2>
<div class="calendar" id="calendar"></div>

<h2>Next Payments</h2>
<div id="nextPayments"></div>

<h2>Subscriptions</h2>
<div id="list"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

let subs = JSON.parse(localStorage.getItem("subs") || "[]");
let budgets = JSON.parse(localStorage.getItem("budgets") || "[]");

function save(){
localStorage.setItem("subs",JSON.stringify(subs));
localStorage.setItem("budgets",JSON.stringify(budgets));
}

function addBudget(){
const name=prompt("Budget name");
const amount=Number(prompt("Monthly amount"));
budgets.push({name,amount});
save();
render();
}

function addSub(){

if(budgets.length===0){
alert("Add budget first");
return;
}

const name=prompt("Subscription name");
const price=Number(prompt("Price"));
const category=prompt("Category (utilities, apps, gym etc)");
const day=Number(prompt("Payment day"));
const budget=prompt("Budget name");

subs.push({name,price,category,day,budget});
save();
render();
}

function markPaid(i){
subs[i].lastPaid=new Date().toISOString();
save();
render();
}

function deleteSub(i){
subs.splice(i,1);
save();
render();
}

function resetFilters(){
document.getElementById("categoryFilter").value="all";
document.getElementById("monthFilter").value="";
render();
}

function render(){

let catFilter=document.getElementById("categoryFilter").value;

let income=0;
budgets.forEach(b=>income+=b.amount);

let monthly=0;
let categories=new Set();
let categoryTotals={};

let list=document.getElementById("list");
list.innerHTML="";

subs.forEach((s,i)=>{

categories.add(s.category);

if(catFilter!=="all" && s.category!==catFilter) return;

monthly+=s.price;

categoryTotals[s.category]=(categoryTotals[s.category]||0)+s.price;

let div=document.createElement("div");
div.className="sub";

div.innerHTML=
"<b>"+s.name+"</b><br>"+
"£"+s.price+
"<br>"+s.category+
"<br>Budget: "+s.budget+
"<br>Day: "+s.day+
"<br><button class='paid' onclick='markPaid("+i+")'>Mark Paid</button>"+
"<br><button class='delete' onclick='deleteSub("+i+")'>Remove</button>";

list.appendChild(div);

});

let select=document.getElementById("categoryFilter");
select.innerHTML="<option value='all'>All Categories</option>";
categories.forEach(c=>{
let opt=document.createElement("option");
opt.value=c;
opt.textContent=c;
select.appendChild(opt);
});

let remaining=income-monthly;

document.getElementById("income").innerText="£"+income;
document.getElementById("monthly").innerText="£"+monthly;
document.getElementById("remaining").innerText="£"+remaining;

buildAnalytics(categoryTotals);
buildNextPayments();
buildCalendar();
buildChart(categoryTotals);

let forecast=monthly;
document.getElementById("forecast").innerText="£"+forecast;

}

function buildAnalytics(data){

let el=document.getElementById("analytics");
el.innerHTML="";

for(let k in data){
let div=document.createElement("div");
div.className="card";
div.innerHTML=k+"<br><b>£"+data[k]+"</b>";
el.appendChild(div);
}

}

function buildNextPayments(){

let container=document.getElementById("nextPayments");
container.innerHTML="";

let today=new Date();

let list=subs.map(s=>{
let d=new Date();
d.setDate(s.day);
return {...s,date:d};
});

list.sort((a,b)=>a.date-b.date);

list.slice(0,5).forEach(p=>{
let div=document.createElement("div");
div.className="card";

div.innerHTML=
p.name+" — £"+p.price+
"<br>"+p.date.toDateString()+
"<br>"+p.budget;

container.appendChild(div);
});

}

function buildCalendar(){

let cal=document.getElementById("calendar");
cal.innerHTML="";

for(let i=1;i<=30;i++){
let div=document.createElement("div");
div.className="day";

let found=subs.filter(s=>s.day===i);

if(found.length>0){
div.classList.add("highlight");
div.innerHTML=i+"<br>"+found.length+" payments";
}else{
div.innerText=i;
}

cal.appendChild(div);
}

}

let chart;

function buildChart(data){

let ctx=document.getElementById("chart");

if(chart) chart.destroy();

chart=new Chart(ctx,{
type:"bar",
data:{
labels:Object.keys(data),
datasets:[{
data:Object.values(data)
}]
},
options:{
plugins:{legend:{display:false}},
scales:{y:{beginAtZero:true}}
}
});

}

render();

</script>

</body>
</html>
